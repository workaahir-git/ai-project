<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Plan — FitForge</title>
<style>
  body { margin: 0; font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background: #f1faf5; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: #fff; border-bottom: 1px solid #d9e7e1;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar a {
    color: #1f8a70; text-decoration: none; font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .topbar a:hover { text-decoration: underline; }
  .topbar span { font-weight: 700; color: #1d2b2b; font-size: 14px; }
  #frameWrap { width: 100%; }
  iframe { width: 100%; min-height: calc(100vh - 56px); border: 0; display: block; }
  #empty {
    max-width: 480px; margin: 80px auto; text-align: center; color: #5b6e6a;
    font-size: 14px; padding: 0 20px;
  }
  #empty a { color: #1f8a70; font-weight: 700; }
</style>
</head>
<body>

<div class="topbar">
  <a href="dashbord.html">← Back to form</a>
  <span>Your Personalised Plan</span>
</div>

<div id="frameWrap" style="display:none">
  <iframe id="planFrame"></iframe>
</div>

<div id="empty" style="display:none">
  No plan found. Please go back and generate one from
  <a href="dashbord.html">the form</a>.
</div>

<script>
  const html = sessionStorage.getItem("fitforge_plan_html");
  if (html) {
    document.getElementById("frameWrap").style.display = "block";
    document.getElementById("planFrame").srcdoc = html;
    sessionStorage.removeItem("fitforge_plan_html");
  } else {
    document.getElementById("empty").style.display = "block";
  }
</script>

</body>
</html>
