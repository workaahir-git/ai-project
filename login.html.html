<!doctype html>
<html>
<head>
  <title>Login</title>
  <script type="module">
    import { createClient }
    from 'https://esm.sh/@supabase/supabase-js'

    const supabase = createClient(
      'http://localhost:3000',
      'sb_secret_wUCcgspmn-8sSM46mikF8w_fBhxlyJA'
    )

    window.signup = async () => {
      const email =
        document.getElementById('email').value

      const password =
        document.getElementById('password').value

      const { error } =
        await supabase.auth.signUp({
          email,
          password
        })

      if (error)
        alert(error.message)
      else
        alert('Account created')
    }

    window.login = async () => {
      const email =
        document.getElementById('email').value

      const password =
        document.getElementById('password').value

      const { error } =
        await supabase.auth.signInWithPassword({
          email,
          password
        })

      if (error)
        alert(error.message)
      else
        window.location.href =
          'dashbord.html'
    }
  </script>
</head>
<body>

<h2>Login</h2>

<input
  id="email"
  type="email"
  placeholder="Email">

<input
  id="password"
  type="password"
  placeholder="Password">

<button onclick="login()">
  Login
</button>

<button onclick="signup()">
  Sign Up
</button>

</body>
</html>
