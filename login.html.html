<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymCoach Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: #0a0714;
    color: #f8fafc;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .glow { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .glow span { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .28; }
  .glow .a { width: 420px; height: 420px; top: -120px; left: -120px; background: linear-gradient(135deg,#a855f7,#6366f1); }
  .glow .b { width: 460px; height: 460px; bottom: -140px; right: -120px; background: linear-gradient(135deg,#6366f1,#a855f7); opacity: .2; }

  .card {
    width: 100%;
    max-width: 420px;
    background: #150f24;
    border: 1px solid rgba(139,92,246,.18);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,.6);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg,#a855f7,#6366f1);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 8px 24px -8px rgba(139,92,246,.6);
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    color: #f8fafc;
    letter-spacing: -0.3px;
  }

  .logo-text span { font-family:'Baloo 2',cursive; font-style: italic; font-weight: 600; color: #c4b5fd; }

  /* TABS */
  .tabs {
    display: flex;
    background: #0f0a1c;
    border: 1px solid rgba(139,92,246,.18);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    background: none;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 700;
    color: #94a3b8;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.2px;
  }

  .tab.active {
    background: linear-gradient(135deg,#a855f7,#6366f1);
    color: #ffffff;
  }

  /* FORM HEADING */
  .form-heading {
    font-size: 22px;
    font-weight: 800;
    color: #f8fafc;
    margin-bottom: 4px;
    letter-spacing: -0.4px;
  }

  .form-sub {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 24px;
  }

  /* INPUTS */
  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .field-input {
    position: relative;
    display: flex;
    align-items: center;
  }

  .field-input svg {
    position: absolute;
    left: 14px;
    width: 16px;
    height: 16px;
    stroke: #64748b;
    pointer-events: none;
  }

  .field input {
    width: 100%;
    background: #0f0a1c;
    border: 1px solid rgba(139,92,246,.18);
    border-radius: 10px;
    padding: 12px 14px 12px 40px;
    font-size: 14px;
    color: #f8fafc;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input::placeholder { color: #475569; }

  .field input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 0 3px rgba(168,85,247,.2);
  }

  /* BUTTON */
  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg,#a855f7,#6366f1);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    margin-top: 8px;
    transition: transform 0.15s, filter 0.2s;
    letter-spacing: 0.2px;
    box-shadow: 0 14px 34px -14px rgba(139,92,246,.6);
  }

  .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }

  /* SWITCH LINK */
  .switch-text {
    text-align: center;
    font-size: 13px;
    color: #64748b;
    margin-top: 20px;
  }

  .switch-text span {
    color: #c4b5fd;
    cursor: pointer;
    font-weight: 700;
  }

  .switch-text span:hover { text-decoration: underline; }

  /* DEMO BUTTON */
  .demo-divider {
    border: none;
    border-top: 1px solid rgba(139,92,246,.18);
    margin: 22px 0 16px;
  }

  .demo-btn {
    width: 100%;
    padding: 12px;
    background: rgba(139,92,246,.1);
    border: 1px solid rgba(139,92,246,.3);
    color: #c4b5fd;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }

  .demo-btn:hover { background: rgba(139,92,246,.18); }

  /* ERROR */
  .error-msg {
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.35);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #f87171;
    margin-bottom: 14px;
    display: none;
  }

  .btn.loading {
    opacity: 0.6;
    cursor: not-allowed;
  }
</style>
</head>

<body>
<div class="glow"><span class="a"></span><span class="b"></span></div>

<div class="card">

  <div class="logo">
    <div class="logo-icon">💪</div>
    <div class="logo-text">GymCoach<span>.studio</span></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="loginTab">Log in</button>
    <button class="tab" id="signupTab">Sign up</button>
  </div>

  <!-- ERROR -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-heading">Welcome back</div>
    <div class="form-sub">Log in to your gym dashboard</div>

    <div class="field">
      <label>Email</label>
      <div class="field-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn" id="loginBtn">Log in</button>

    <div class="switch-text">
      No account? <span id="goSignup">Create one</span>
    </div>

    <hr class="demo-divider">
    <button class="demo-btn" id="demoBtn">✦ Try with demo account</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none">
    <div class="form-heading">Create account</div>
    <div class="form-sub">Start your gym's AI coaching journey</div>

    <div class="field">
      <label>Username</label>
      <div class="field-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="signupUsername" type="text" placeholder="Your gym name">
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <div class="field-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
        <input id="signupEmail" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="signupPassword" type="password" placeholder="Min. 6 characters">
      </div>
    </div>

    <div class="field">
      <label>Confirm password</label>
      <div class="field-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="confirmPassword" type="password" placeholder="Repeat password">
      </div>
    </div>

    <button class="btn" id="signupBtn">Create account</button>

    <div class="switch-text">
      Already have an account? <span id="goLogin">Log in</span>
    </div>
  </div>

</div>

<script>
  // Fire-and-forget: wake up the Render backend the instant this page loads,
  // so it's hopefully warm by the time the user reaches "Generate My Plan".
  // We don't await this or show any UI for it — just let it run in the background.
  fetch('https://ai-project-login-de6g.onrender.com/health').catch(() => {
    // Silently ignore errors — this is just a best-effort warm-up ping.
  });
</script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://yabclxadadynmprymcns.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhYmNseGFkYWR5bm1wcnltY25zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njg4NzIsImV4cCI6MjA5ODA0NDg3Mn0.e2IwBxrW-NbMIqqWFZb8gnh5T95vlDwS-h2FhlWRb1k'
)

const loginForm  = document.getElementById('loginForm')
const signupForm = document.getElementById('signupForm')
const loginTab   = document.getElementById('loginTab')
const signupTab  = document.getElementById('signupTab')
const errorMsg   = document.getElementById('errorMsg')

function showError(msg) {
  errorMsg.textContent = msg
  errorMsg.style.display = 'block'
}

function hideError() {
  errorMsg.style.display = 'none'
  errorMsg.textContent = ''
}

function showLogin() {
  loginForm.style.display = 'block'
  signupForm.style.display = 'none'
  loginTab.classList.add('active')
  signupTab.classList.remove('active')
  hideError()
}

function showSignup() {
  signupForm.style.display = 'block'
  loginForm.style.display = 'none'
  signupTab.classList.add('active')
  loginTab.classList.remove('active')
  hideError()
}

loginTab.addEventListener('click', showLogin)
signupTab.addEventListener('click', showSignup)
document.getElementById('goSignup').addEventListener('click', showSignup)
document.getElementById('goLogin').addEventListener('click', showLogin)

async function doLogin(email, password) {
  hideError()
  if (!email || !password) { showError('Please fill in all fields'); return }

  const btn = document.getElementById('loginBtn')
  btn.textContent = 'Logging in...'
  btn.classList.add('loading')

  const { error } = await supabase.auth.signInWithPassword({ email, password })

  btn.textContent = 'Log in'
  btn.classList.remove('loading')

  if (error) { showError(error.message); return }

  window.location.href = 'dashbord.html'
}

// LOGIN
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email    = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value
  await doLogin(email, password)
})

// DEMO ACCOUNT — fills + submits with demo credentials
document.getElementById('demoBtn').addEventListener('click', async () => {
  document.getElementById('loginEmail').value = 'demo@gymcoach.studio'
  document.getElementById('loginPassword').value = 'demo1234'
  await doLogin('demo@gymcoach.studio', 'demo1234')
})

// SIGNUP
document.getElementById('signupBtn').addEventListener('click', async () => {
  hideError()
  const username        = document.getElementById('signupUsername').value.trim()
  const email           = document.getElementById('signupEmail').value.trim()
  const password        = document.getElementById('signupPassword').value
  const confirmPassword = document.getElementById('confirmPassword').value

  if (!username)                    { showError('Please enter a username'); return }
  if (!email)                       { showError('Please enter an email'); return }
  if (password.length < 6)         { showError('Password must be at least 6 characters'); return }
  if (password !== confirmPassword) { showError('Passwords do not match'); return }

  const btn = document.getElementById('signupBtn')
  btn.textContent = 'Creating account...'
  btn.classList.add('loading')

  const { error } = await supabase.auth.signUp({ email, password })

  btn.textContent = 'Create account'
  btn.classList.remove('loading')

  if (error) { showError(error.message); return }

  localStorage.setItem('username', username)
  alert('Account created! Check your email to confirm.')
  showLogin()
})
</script>
</body>
</html>
