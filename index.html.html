<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GymCoach Studio</title>
  <meta name="description" content="AI-powered coaching tools for gyms and their members." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0714; --bg-2:#0f0a1c;
    --card:#150f24; --border:rgba(139,92,246,.18);
    --fg:#f8fafc; --muted:#94a3b8; --dim:#64748b;
    --p1:#a855f7; --p2:#6366f1;
    --grad:linear-gradient(135deg,#a855f7,#6366f1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh; background:var(--bg); color:var(--fg);
    font-family:'Inter',sans-serif; position:relative; overflow-x:hidden;
  }
  .glow{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
  .glow span{position:absolute;border-radius:50%;filter:blur(90px);opacity:.30;}
  .glow .a{width:420px;height:420px;top:-120px;left:-100px;background:var(--grad);}
  .glow .b{width:480px;height:480px;bottom:-140px;right:-120px;background:linear-gradient(135deg,#6366f1,#a855f7);opacity:.22;}

  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 40px;border-bottom:1px solid var(--border);
  }
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
  .logo-icon{
    width:36px;height:36px;border-radius:11px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:0 8px 24px -8px rgba(139,92,246,.6);
  }
  .logo .studio{font-family:'Baloo 2',cursive;font-style:italic;font-weight:600;color:#c4b5fd;}

  main{
    display:flex;min-height:calc(100vh - 69px);align-items:center;justify-content:center;padding:24px;
  }
  .hero{max-width:640px;text-align:center;}
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid rgba(139,92,246,.35); background:rgba(139,92,246,.1);
    color:#c4b5fd; font-size:12px; font-weight:700; padding:6px 14px;
    border-radius:999px; margin-bottom:22px;
  }
  h1{
    font-family:'Baloo 2',cursive; font-size:3rem; font-weight:800; letter-spacing:-1px;
    line-height:1.08; margin-bottom:18px;
  }
  h1 .accent{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p{color:var(--muted); font-size:16px; line-height:1.6; margin-bottom:32px;}
  .cta{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--grad); color:#fff; font-weight:700; font-size:15px;
    padding:14px 30px; border-radius:12px; text-decoration:none;
    box-shadow:0 14px 40px -14px rgba(139,92,246,.6);
    transition:transform .2s ease, filter .2s ease;
  }
  .cta:hover{transform:translateY(-2px); filter:brightness(1.08);}
</style>
</head>
<body>

<div class="glow"><span class="a"></span><span class="b"></span></div>

<nav>
  <div class="logo">
    <div class="logo-icon">💪</div>
    <div>GymCoach<span class="studio">.studio</span></div>
  </div>
</nav>

<main>
  <div class="hero">
    <span class="badge">✨ AI coaching for Indian gym-goers</span>
    <h1>Smart plans. <span class="accent">Real results.</span></h1>
    <p>
      Smart coaching tools your gym can use with every member —
      tailored workouts, diet plans and progression, forged in seconds.
      Log in to get started.
    </p>
    <a class="cta" href="login.html">Log in →</a>
  </div>
</main>

</body>
</html>
