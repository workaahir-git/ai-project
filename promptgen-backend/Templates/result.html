<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Plan — GymCoach Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0714; --card:#150f24; --border:rgba(139,92,246,.18);
    --fg:#f8fafc; --muted:#94a3b8;
    --grad:linear-gradient(135deg,#a855f7,#6366f1);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background: var(--bg); color: var(--fg); }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px; background: var(--bg); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { display:flex; align-items:center; gap:10px; font-weight:800; font-size:16px; }
  .logo-icon { width:32px; height:32px; border-radius:10px; background:var(--grad); display:flex; align-items:center; justify-content:center; font-size:15px; box-shadow:0 8px 20px -8px rgba(139,92,246,.6); }
  .logo .studio { font-family:'Baloo 2',cursive; font-style:italic; font-weight:600; color:#c4b5fd; }
  .topbar a.back {
    color: #c4b5fd; text-decoration: none; font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .topbar a.back:hover { text-decoration: underline; }
  .topbar .title { font-weight: 700; color: var(--fg); font-size: 14px; }
  #frameWrap { width: 100%; }
  iframe { width: 100%; min-height: calc(100vh - 60px); border: 0; display: block; background: var(--bg); }
  #empty {
    max-width: 480px; margin: 80px auto; text-align: center; color: var(--muted);
    font-size: 14px; padding: 0 20px;
  }
  #empty a { color: #c4b5fd; font-weight: 700; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">💪</div>
    <div>GymCoach<span class="studio">.studio</span></div>
  </div>
  <a class="back" href="dashbord.html">← Back to form</a>
  <span class="title">Your Personalised Plan</span>
</div>

<div id="frameWrap" style="display:none">
  <iframe id="planFrame"></iframe>
</div>

<div id="empty" style="display:none">
  No plan found. Please go back and generate one from
  <a href="dashbord.html">the form</a>.
</div>

<script>
  const html = sessionStorage.getItem("fitforge_plan_html");
  if (html) {
    document.getElementById("frameWrap").style.display = "block";
    document.getElementById("planFrame").srcdoc = html;
    sessionStorage.removeItem("fitforge_plan_html");
  } else {
    document.getElementById("empty").style.display = "block";
  }
</script>

</body>
</html>
