<style>
:root {
  --bg: #0a0714; --fg: #f8fafc; --muted: #94a3b8; --card: #150f24;

  --grad-heading: linear-gradient(135deg, #c084fc, #818cf8);
  --grad-warm: linear-gradient(135deg, #a855f7, #6366f1);
  --shadow-glow: 0 18px 50px -18px rgba(139,92,246,.55);

}
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; position: relative; }
.topnav { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); position:relative; z-index:5; }
.topnav .logo { display:flex; align-items:center; gap:10px; font-weight:800; font-size:17px; color:var(--fg); }
.topnav .logo-icon { width:34px; height:34px; border-radius:10px; background:var(--grad-primary); display:flex; align-items:center; justify-content:center; font-size:16px; box-shadow:0 8px 22px -8px rgba(139,92,246,.6); }
.topnav .logo .studio { font-family:'Baloo 2',cursive; font-style:italic; font-weight:600; color:#c4b5fd; }
.topnav .right { display:flex; align-items:center; gap:18px; }

.topnav .right a.dash-link:hover { color:var(--fg); }
.avatar-pill { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); padding:6px 12px 6px 6px; border-radius:999px; }
.avatar-pill .circle { width:26px; height:26px; border-radius:50%; background:var(--grad-primary); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; }
.avatar-pill span { font-size:13px; font-weight:600; color:var(--fg); }
.logout-btn { background:none; border:1px solid var(--border); color:var(--muted); width:34px; height:34px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.logout-btn:hover { color:var(--fg); border-color:rgba(139,92,246,.4); }
.blobs { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); }
.blob.a { width: 380px; height: 380px; top: -90px; left: -90px; background: var(--grad-hero); opacity: .28; animation: float1 14s ease-in-out infinite; }
.blob.b { width: 460px; height: 460px; top: 160px; right: -130px; background: var(--grad-warm); opacity: .2; animation: float2 18s ease-in-out infinite; }
.blob.c { width: 320px; height: 320px; bottom: -80px; left: 35%; background: var(--grad-primary); opacity: .16; animation: float1 16s ease-in-out infinite; }
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(14px,-26px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-18px,22px)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes pop { 0%{opacity:0;transform:scale(.92)} 60%{opacity:1;transform:scale(1.03)} 100%{transform:scale(1)} }

h1 { font-family:'Baloo 2',cursive; font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -.5px; background: var(--grad-heading); -webkit-background-clip: text; background-clip: text; color: transparent; }
header p { color: var(--muted); max-width: 420px; margin: 12px auto 0; font-size: 14px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 20px; box-shadow: var(--shadow-card); animation: fadeUp .55s cubic-bezier(.16,1,.3,1) both; transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s ease; }

.icon { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; background: var(--grad-primary); color: #fff; font-size: 18px; box-shadow: 0 8px 22px -10px rgba(139,92,246,.7); }
.card-head h3 { margin: 0; font-size: 1rem; color: var(--fg); }
.grid { display: grid; gap: 12px; }
.grid.c2 { grid-template-columns: 1fr 1fr; }
.grid.c3 { grid-template-columns: 1fr 1fr 1fr; }

label.lbl { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
input, select, textarea { width: 100%; padding: 9px 12px; font-size: 14px; color: var(--fg); border: 1px solid var(--border); border-radius: 10px; background: #0f0a1c; outline: none; transition: border-color .2s, box-shadow .2s; font-family: inherit; }
input::placeholder, textarea::placeholder { color: #475569; }
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(168,85,247,.2); }
select option { background: #150f24; color: var(--fg); }
textarea { resize: vertical; min-height: 64px; }
.bmi { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; background: var(--grad-primary); color: #fff; border-radius: 12px; padding: 12px 18px; margin: 12px 0; box-shadow: var(--shadow-glow); animation: pop .3s cubic-bezier(.16,1,.3,1); }
.bmi small { display: block; font-size: 11px; opacity: .85; }
.bmi b { font-size: 1.3rem; }
.macro-box { display: flex; gap: 16px; flex-wrap: wrap; background: rgba(139,92,246,.08); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; margin: 12px 0; }
.macro-item { text-align: center; }
.macro-item small { display: block; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.macro-item b { font-size: 1.1rem; color: #c4b5fd; }
input[type=range] { -webkit-appearance: none; appearance: none; height: 8px; padding: 0; border: none; border-radius: 999px; background: linear-gradient(to right, var(--primary), var(--primary-2)); cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); box-shadow: var(--shadow-glow); transition: transform .15s; }
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type=range]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-box { max-height: 220px; overflow-y: auto; border: 1px solid var(--border); background: #0f0a1c; border-radius: 12px; padding: 12px; }
.chip { border: 1px solid var(--border); background: #150f24; color: var(--muted); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: all .2s; animation: pop .3s cubic-bezier(.16,1,.3,1); }
.chip:hover { transform: translateY(-2px); border-color: rgba(168,85,247,.5); color: var(--fg); }
.chip.active { background: var(--grad-primary); color: #fff; border-color: transparent; box-shadow: var(--shadow-glow); }
.submit { width: 100%; border: none; cursor: pointer; color: #fff; background: var(--grad-hero); font-size: 14px; font-weight: 700; padding: 14px; border-radius: 16px; box-shadow: var(--shadow-glow); display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform .2s, filter .2s; animation: fadeUp .55s both; }
.submit:hover { transform: translateY(-2px); filter: brightness(1.08); }
.submit:active { transform: scale(.99); }
.status { font-size: 12px; font-weight: 600; }
.status.success { color: var(--success); }
.status.error { color: var(--danger); }
.status .spin { display: inline-block; animation: spin 1s linear infinite; }
pre { white-space: pre-wrap; background: #0f0a1c; color: var(--fg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-size: 12px; line-height: 1.55; max-height: 380px; overflow: auto; margin: 0; }

</style>

<script>
const BACKEND_BASE = "https://ai-project-login-de6g.onrender.com";
const RESULT_ENDPOINT = `${BACKEND_BASE}/result`;

const EQUIPMENT = ["Barbell","Dumbbells","EZ curl bar","Flat bench","Incline/decline bench","Squat rack","Power rack / cage","Smith machine","Cable machine (dual stack)","Lat pulldown","Seated row machine","Leg press","Hack squat machine","Leg extension machine","Leg curl machine","Chest press machine","Shoulder press machine","Pec deck / chest fly machine","Assisted pull-up/dip machine","Pull-up bar","Dip station","Preacher curl bench","Hyperextension bench","Calf raise machine","Hip thrust machine / Smith setup","Cable crossover","Functional trainer","Kettlebells","Resistance bands","Battle ropes","Medicine balls","TRX / suspension trainer","Treadmill","Stationary bike / spin bike","Elliptical / cross-trainer","Rowing machine","Stair climber","Foam roller"];
const ALLERGIES = ["Lactose / dairy","Gluten / wheat","Peanuts / tree nuts","Soy","Eggs","Shellfish / seafood","None"];
const ACTIVITY = {sedentary:"Sedentary (desk job, little exercise)",light:"Lightly active (light exercise 1–3 days/week)",moderate:"Moderately active (moderate exercise 3–5 days/week)",very_active:"Very active (hard exercise 6–7 days/week)",extreme:"Extremely active (physical job + training)"};
const ACTIVITY_MULTIPLIER = {sedentary:1.2,light:1.375,moderate:1.55,very_active:1.725,extreme:1.9};
const ROTATION = {fixed:"Same meals daily (easy to follow)",short_rotation:"Rotate every 2–3 days",weekly_rotation:"Different meals every day of the week"};
const BUDGET = {low:"Low (₹150–250/day on food)",medium:"Medium (₹250–450/day)",high:"High (₹450+/day)"};

// Protein range by experience (g per kg bodyweight) — must match PROTEIN_MULTIPLIER
// in promptgen-backend/app/fitness_generator.py. Midpoint here is only used for the
// client-side preview estimate shown before the real backend-calculated value returns.
const PROTEIN_RANGE   = {Beginner:"1.0", Intermediate:"1.1–1.3", Advanced:"1.5–2.0"};
const PROTEIN_MIDPOINT = {Beginner:1.0, Intermediate:1.2, Advanced:1.75};

const availableEquipment = new Set(EQUIPMENT);
const allergies = new Set();
const $ = (id) => document.getElementById(id);

function renderEquip() {
  const box = $("equipChips"); box.innerHTML = "";
  EQUIPMENT.forEach(eq => {
    const c = document.createElement("button");
    c.className = "chip" + (availableEquipment.has(eq) ? " active" : "");
    c.textContent = eq;
    c.onclick = () => { availableEquipment.has(eq) ? availableEquipment.delete(eq) : availableEquipment.add(eq); renderEquip(); };
    box.appendChild(c);
  });
  const all = availableEquipment.size === EQUIPMENT.length;
  const toggle = document.createElement("button");
  toggle.className = "chip" + (all ? " active" : "");
  toggle.textContent = all ? "Clear all" : "Select all";
  toggle.onclick = () => { all ? availableEquipment.clear() : EQUIPMENT.forEach(e => availableEquipment.add(e)); renderEquip(); };
  box.appendChild(toggle);
}

function renderAllergies() {
  const box = $("allergyChips"); box.innerHTML = "";
  ALLERGIES.forEach(a => {
    const c = document.createElement("button");
    c.className = "chip" + (allergies.has(a) ? " active" : "");
    c.textContent = a;
    c.onclick = () => { allergies.has(a) ? allergies.delete(a) : allergies.add(a); renderAllergies(); };
    box.appendChild(c);
  });
}

renderEquip(); renderAllergies();

function computeBMI() {
  const h = parseFloat($("height").value), w = parseFloat($("weight").value);
  if (!h || !w) return null;
  return Math.round((w / ((h/100)**2)) * 10) / 10;
}
function bmiCategory(b) { return b<18.5?"Underweight":b<25?"Normal":b<30?"Overweight":"Obese"; }

function computeMacros() {
  const w = parseFloat($("weight").value);
  const h = parseFloat($("height").value);
  const age = parseFloat($("age").value);
  const gender = $("gender").value;
  const goal = $("goal") ? $("goal").value : "Maintenance";
  const experience = $("experience").value;
  const activity = $("activity").value;
  if (!w || !h || !age) return null;

  // Mifflin-St Jeor BMR
  let bmr = gender === "Female"
    ? (10*w) + (6.25*h) - (5*age) - 161
    : (10*w) + (6.25*h) - (5*age) + 5;

  let tdee = Math.round(bmr * (ACTIVITY_MULTIPLIER[activity] || 1.55));

  // Adjust calories based on goal
  let calories = tdee;
  if (goal === "Fat loss") calories = Math.round(tdee * 0.82);
  else if (goal === "Muscle gain") calories = Math.round(tdee * 1.1);
  else if (goal === "Body recomposition") calories = Math.round(tdee * 0.95);
  else if (goal === "Strength building") calories = Math.round(tdee * 1.05);

  // Protein by experience (midpoint of range)
  const proteinG = Math.round(w * PROTEIN_MIDPOINT[experience]);
  const fatG = Math.round((calories * 0.25) / 9);
  const carbG = Math.round((calories - proteinG*4 - fatG*9) / 4);

  return { calories, proteinG, carbG, fatG, tdee };
}

  // already running. Previously the button stayed clickable the whole time,
  // so a second click here started a fully separate handleSubmit() call —
  // and therefore a second Gemini request — on top of the first.
  if (_isGenerating) return;
  _isGenerating = true;
  const submitBtn = document.querySelector(".submit");
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.style.opacity = "0.6";
    submitBtn.style.cursor = "not-allowed";
    submitBtn.textContent = "⏳ Generating…";
  }

  const { bmi, macros } = buildPrompt();
  $("resultCard").style.display = "block";
  renderMacros();

  const s = $("status");
  const out = $("output");
  const frame = $("planFrame");
  frame.style.display = "none";
  out.style.display = "block";
  s.className = "status"; s.innerHTML = '<span class="spin">⏳</span> Generating your plan…';
  out.textContent = "Please wait — your personalised plan is being generated by AI…";

  const otherAllergy = $("otherAllergy").value.trim();
  const allergyList = [...allergies].filter(a => a !== "None");
  if (otherAllergy) allergyList.push(otherAllergy);

  const body = new URLSearchParams({
    name: $("name").value,
    age: $("age").value,
    gender: $("gender").value,
    height: $("height").value,
    weight: $("weight").value,
    target: $("target").value,
    goal: $("goal").value,
    experience: $("experience").value,
    activity: $("activity").value,
    days: $("days").value,
    duration: $("duration").value,
    diet: $("diet").value,
    meals: $("meals").value,
    notes: $("notes").value,
    region: $("region").value,
    budget: $("budget").value,
    allergies: allergyList.length ? allergyList.join(", ") : "none",
    equipment: [...availableEquipment].join(", ") || "full gym",
  });

  try {
    const token = await window.__getAccessToken();
    if (!token) {
      throw new Error("Your session expired — please log in again.");
    }

    // Render's free tier can sleep after inactivity — the first request after
    // a while can take 30-60+ seconds to wake the server back up. We retry a
    // couple of times with increasing patience instead of failing immediately,
    // and update the message so it doesn't look broken while waiting.
    // NOTE on why retrying here is now safe: the backend caps each Gemini call
    // at ~55s server-side AND dedupes overlapping requests per user (see
    // main.py _inflight_results) — so if this retry fires while the previous
    // attempt is still technically in flight, the backend attaches it to the
    // SAME Gemini call instead of starting a second one. Retrying no longer
    // burns extra requests against the daily quota.
    const fetchAttempts = [
      { timeoutMs: 65000,  message: 'Generating your plan — this can take up to a minute for a full weekly plan…' },
      { timeoutMs: 65000,  message: 'Still working — first request after idle time can be slower, hang tight…' },
    ];

    let res = null;
    let lastErr = null;

    for (let i = 0; i < fetchAttempts.length; i++) {
      const attempt = fetchAttempts[i];
      s.className = "status"; s.innerHTML = '<span class="spin">⏳</span> ' + attempt.message;

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), attempt.timeoutMs);

      try {
        res = await fetch(RESULT_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "Authorization": `Bearer ${token}`,
          },
          body,
          signal: controller.signal,
        });
        clearTimeout(timer);

        // 502/503/504 from Render usually mean the service is still waking up
        // from sleep — treat these as retryable too, not just network failures.
        if ([502, 503, 504].includes(res.status) && i < fetchAttempts.length - 1) {
          res = null;
          await new Promise(r => setTimeout(r, 8000)); // give a possibly still-running prior attempt time to finish
          continue;
        }
        break; // got a real (non-transient) response, stop retrying
      } catch (err) {
        clearTimeout(timer);
        lastErr = err;
        res = null;
        // try again with the next, more patient attempt
      }
    }

    if (!res) {
      throw new Error(
        "Couldn't reach the server after several tries. It may still be waking up — please wait a few seconds and try again."
      );
    }

    const html = await res.text();

    if (res.status === 401) {
      throw new Error("Your session expired — please log in again.");
    }
    if (!res.ok) {
      throw new Error("Backend returned an error (status " + res.status + ").");
    }

    out.style.display = "none";
    s.className = "status success"; s.textContent = "✓ Plan generated — redirecting…";
    sessionStorage.setItem("fitforge_plan_html", html);
    window.location.href = "result.html";

  } catch (err) {
    out.style.display = "block";
    out.textContent = "Error: " + err.message;
    s.className = "status error"; s.textContent = "✗ " + err.message;
  } finally {
    _isGenerating = false;
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.style.opacity = "";
      submitBtn.style.cursor = "";
      submitBtn.textContent = "📈 Generate My Plan";
    }
  }
}
</script>
</body>
</html>
