<!doctype html>
<html>
<body>

<h1 id="welcome"></h1>

<script type="module">
import { createClient }
from 'https://esm.sh/@supabase/supabase-js'

const supabase = createClient(
  'YOUR_SUPABASE_URL',
  'YOUR_SUPABASE_ANON_KEY'
)

const {
  data: { user }
} = await supabase.auth.getUser()

if (!user)
  location.href = 'login2.html'

document.getElementById(
  'welcome'
).textContent =
  `Welcome ${user.email}`
</script>

</body>
</html>
