type: web
  name: gymassistant-backend
  runtime: python
  rootDir: promptgen-backend
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  envVars:
key: PYTHON_VERSION
    value: 3.12.7
key: SUPABASE_URL
  sync: false
key: SUPABASE_JWT_SECRET
sync: false
key: GROQ_API_KEY
sync: false
key: FRONTEND_ORIGIN
sync: false