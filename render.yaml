services:
  - type: web
    name: gymassistant-backend
    runtime: python
    rootDir: promptgen-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEMO_GYM_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DEV_TEST_KEY
        sync: false
      - key: MEMBER_FRONTEND_URL
        sync: false
      - key: MEMBER_SESSION_SECRET
        sync: false